<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Bahia Beach Club · Menu</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg: #06090e; --surface: #0d1622; --surface2: #131f32;
      --border: rgba(255,255,255,0.07); --turq: #1fd9c0;
      --turq-dim: rgba(31,217,192,0.12); --gold: #d4a847;
      --white: #f2ede6; --muted: rgba(242,237,230,0.45);
    }
    html, body { height:100%; background:var(--bg); color:var(--white); font-family:'DM Sans',sans-serif; font-weight:300; overflow:hidden; }
    #app { height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
    .ambient { position:fixed; inset:0; pointer-events:none; z-index:0; }
    .blob { position:absolute; border-radius:50%; filter:blur(90px); opacity:.28; pointer-events:none; }
    .b1 { width:280px;height:280px;background:#1fd9c0;top:-100px;right:-60px;animation:drift 14s ease-in-out infinite alternate; }
    .b2 { width:220px;height:220px;background:#d4a847;bottom:15%;left:-80px;animation:drift 18s ease-in-out infinite alternate-reverse; }
    @keyframes drift { from{transform:translate(0,0)} to{transform:translate(20px,30px)} }
    header { position:relative; z-index:10; padding:18px 18px 0; flex-shrink:0; }
    .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .brand-name { font-family:'Playfair Display',serif; font-size:1.1rem; }
    .brand-name span { font-style:italic; color:var(--turq); }
    .table-pill { font-size:.55rem; letter-spacing:.15em; text-transform:uppercase; background:var(--turq); color:var(--bg); padding:6px 14px; border-radius:20px; font-weight:500; }
    .search-wrap { position:relative; margin-bottom:14px; }
    .search-wrap input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:13px 16px 13px 44px; color:var(--white); font-family:'DM Sans',sans-serif; font-size:.85rem; font-weight:300; outline:none; transition:border-color .2s; }
    .search-wrap input::placeholder { color:var(--muted); }
    .search-wrap input:focus { border-color:rgba(31,217,192,.4); }
    .search-ico { position:absolute; left:15px; top:50%; transform:translateY(-50%); font-size:.9rem; pointer-events:none; }
    .cats-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; margin:0 -18px; padding:0 18px; }
    .cats-scroll::-webkit-scrollbar { display:none; }
    .cats { display:flex; gap:8px; padding-bottom:14px; width:max-content; }
    .cat { padding:8px 18px; border-radius:22px; font-size:.68rem; letter-spacing:.04em; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; white-space:nowrap; transition:all .22s; display:flex; align-items:center; gap:6px; }
    .cat.active { background:var(--turq); border-color:var(--turq); color:var(--bg); font-weight:500; }
    .menu-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; padding:0 18px 120px; position:relative; z-index:5; }
    .menu-scroll::-webkit-scrollbar { display:none; }
    .sec { font-size:.5rem; letter-spacing:.3em; text-transform:uppercase; color:var(--turq); margin:20px 0 12px; display:flex; align-items:center; gap:10px; }
    .sec::after { content:''; flex:1; height:1px; background:var(--border); }
    .card { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:18px; margin-bottom:10px; overflow:hidden; cursor:pointer; transition:transform .18s, border-color .2s; touch-action:manipulation; -webkit-tap-highlight-color:rgba(0,0,0,0); }
    .card:active { transform:scale(.98); opacity:.9; border-color:rgba(31,217,192,.3); }
    .card-visual { width:96px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:3rem; position:relative; overflow:hidden; min-height:96px; }
    .card-visual-bg { position:absolute; inset:0; }
    .card-emoji { position:relative; z-index:1; }
    .card-info { flex:1; padding:14px 12px 14px 14px; display:flex; flex-direction:column; justify-content:space-between; min-width:0; }
    .card-row1 { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:5px; }
    .card-name { font-family:'Playfair Display',serif; font-size:.98rem; line-height:1.2; flex:1; }
    .card-badges { display:flex; gap:4px; flex-shrink:0; flex-direction:column; align-items:flex-end; }
    .badge { font-size:.38rem; letter-spacing:.1em; text-transform:uppercase; padding:3px 8px; border-radius:8px; white-space:nowrap; }
    .badge-ar { border:1px solid rgba(31,217,192,.35); color:var(--turq); }
    .badge-new { border:1px solid rgba(212,168,71,.35); color:var(--gold); }
    .card-desc { font-size:.61rem; color:var(--muted); line-height:1.55; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:10px; flex:1; }
    .card-bottom { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .card-price { font-family:'Playfair Display',serif; font-size:1.05rem; color:var(--gold); }
    .card-ar-hint { font-size:.48rem; letter-spacing:.08em; text-transform:uppercase; color:var(--turq); display:flex; align-items:center; gap:4px; margin-top:3px; }
    .add-quick { width:32px; height:32px; border-radius:50%; background:var(--turq); border:none; color:var(--bg); font-size:1.2rem; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; flex-shrink:0; touch-action:manipulation; -webkit-tap-highlight-color:rgba(0,0,0,0); }
    .add-quick:active { background:var(--gold); transform:scale(.88); }
    /* Loading */
    .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:16px; }
    .spinner { width:40px;height:40px; border:2px solid var(--border); border-top-color:var(--turq); border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-txt { font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; color:var(--turq); }
    .empty { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty span { font-size:3rem; display:block; margin-bottom:14px; }
    /* SHEET */
    .sheet-ov { position:fixed; inset:0; background:rgba(6,9,14,.82); backdrop-filter:blur(10px); z-index:9999; opacity:0; pointer-events:none; transition:opacity .3s; display:flex; align-items:flex-end; }
    .sheet-ov.open { opacity:1; pointer-events:all; }
    .sheet { width:100%; background:var(--surface); border-radius:26px 26px 0 0; border-top:1px solid var(--border); max-height:92dvh; overflow-y:auto; transform:translateY(100%); transition:transform .38s cubic-bezier(.32,.72,0,1); }
    .sheet-ov.open .sheet { transform:translateY(0); }
    .sheet-handle { width:38px; height:4px; background:var(--border); border-radius:2px; margin:13px auto 0; }
    .sheet-hero { height:220px; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .sh-bg { position:absolute; inset:0; }
    .sh-emoji-back { position:absolute; font-size:11rem; opacity:.12; animation:shf 5s ease-in-out infinite; }
    .sh-emoji-main { position:relative; z-index:2; font-size:5rem; animation:shf 3.5s ease-in-out infinite reverse; filter:drop-shadow(0 12px 30px rgba(31,217,192,.35)); }
    @keyframes shf { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-14px) rotate(4deg)} }
    .sh-fade { position:absolute; bottom:0; left:0; right:0; height:80px; background:linear-gradient(to top, var(--surface), transparent); }
    .sheet-body { padding:22px 22px 36px; }
    .sh-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:5px; }
    .sh-name { font-family:'Playfair Display',serif; font-size:1.65rem; line-height:1.1; flex:1; padding-right:14px; }
    .sh-close { width:34px;height:34px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); display:flex;align-items:center;justify-content:center; cursor:pointer; color:var(--muted); font-size:.85rem; }
    .sh-cat { font-size:.52rem; letter-spacing:.22em; text-transform:uppercase; color:var(--turq); margin-bottom:14px; }
    .sh-desc { font-size:.78rem; line-height:2; color:var(--muted); margin-bottom:20px; }
    .chips-lbl { font-size:.5rem; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
    .chip { padding:6px 14px; border-radius:20px; border:1px solid var(--border); font-size:.62rem; background:var(--surface2); display:flex; align-items:center; gap:6px; }
    .chip-dot { width:5px;height:5px; background:var(--turq); border-radius:50%; }
    .intensity { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--surface2); border-radius:12px; margin-bottom:20px; }
    .int-lbl { font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
    .int-dots { display:flex; gap:5px; }
    .int-dot { width:9px;height:9px; border-radius:50%; border:1px solid var(--border); }
    .int-dot.on { background:var(--turq); border-color:var(--turq); }
    .ar-visualize { width:100%; padding:18px; border-radius:16px; background:linear-gradient(135deg,rgba(31,217,192,.18),rgba(31,217,192,.06)); border:1px solid rgba(31,217,192,.3); color:var(--turq); font-family:'DM Sans',sans-serif; font-size:.8rem; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:16px; transition:all .25s; font-weight:400; }
    .ar-visualize:active { background:rgba(31,217,192,.25); transform:scale(.99); }
    .sh-actions { display:flex; align-items:center; gap:12px; }
    .qty { display:flex; align-items:center; gap:12px; background:var(--surface2); border-radius:14px; padding:8px 16px; }
    .qty-btn { width:30px;height:30px; border-radius:50%; background:var(--surface); border:1px solid var(--border); color:var(--white); font-size:1.1rem; display:flex;align-items:center;justify-content:center; cursor:pointer; transition:all .15s; }
    .qty-btn:active { background:var(--turq); color:var(--bg); }
    .qty-n { font-family:'Playfair Display',serif; font-size:1.1rem; min-width:18px; text-align:center; }
    .add-main { flex:1; padding:16px; border-radius:14px; background:var(--turq); border:none; color:var(--bg); font-family:'DM Sans',sans-serif; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:space-between; font-weight:500; transition:all .2s; }
    .add-main:active { background:var(--gold); }
    .add-main-price { font-family:'Playfair Display',serif; font-size:.95rem; }
    /* AR */
    .ar-screen { position:fixed; inset:0; background:var(--bg); z-index:10001; display:flex; flex-direction:column; opacity:0; pointer-events:none; transition:opacity .35s; }
    .ar-screen.open { opacity:1; pointer-events:all; }
    .ar-topbar { position:absolute; top:0; left:0; right:0; padding:16px 18px; display:flex; justify-content:space-between; align-items:center; z-index:10; background:linear-gradient(to bottom, rgba(6,9,14,.9), transparent); }
    .ar-back-btn { font-size:.58rem; letter-spacing:.18em; text-transform:uppercase; color:var(--white); background:rgba(13,22,34,.8); border:1px solid var(--border); padding:9px 18px; border-radius:22px; cursor:pointer; }
    .ar-topbar-title { font-family:'Playfair Display',serif; font-size:.95rem; font-style:italic; }
    .ar-topbar-price { font-family:'Playfair Display',serif; font-size:.9rem; color:var(--gold); }
    .mv-wrap { flex:1; position:relative; background:radial-gradient(ellipse 80% 60% at 50% 60%, rgba(13,32,53,0.8) 0%, var(--bg) 100%); }
    model-viewer { width:100%; height:100%; background:transparent; --poster-color:transparent; }
    .mv-loading { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:2; transition:opacity .4s; }
    .mv-loading.hidden { opacity:0; pointer-events:none; }
    .mv-spinner { width:48px;height:48px; border:2px solid var(--border); border-top-color:var(--turq); border-radius:50%; animation:spin 1s linear infinite; }
    .mv-loading-txt { font-size:.6rem; letter-spacing:.25em; text-transform:uppercase; color:var(--turq); }
    .mv-hint { position:absolute; bottom:0; left:0; right:0; padding:0 18px 12px; background:linear-gradient(to top, rgba(6,9,14,.95) 60%, transparent); display:flex; flex-direction:column; gap:12px; z-index:5; }
    .mv-hint-txt { font-size:.52rem; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); text-align:center; display:flex; align-items:center; justify-content:center; gap:8px; }
    .mv-hint-dot { width:5px;height:5px;background:var(--turq);border-radius:50%;animation:blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }
    .ar-launch-row { display:flex; gap:10px; }
    .btn-ar-real { flex:1; padding:17px 20px; border-radius:15px; background:linear-gradient(135deg, var(--turq), #17b8a8); border:none; color:var(--bg); font-family:'DM Sans',sans-serif; font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; font-weight:500; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 6px 24px rgba(31,217,192,.3); transition:all .2s; }
    .btn-add-ar { padding:17px 20px; border-radius:15px; background:rgba(212,168,71,.12); border:1px solid rgba(212,168,71,.3); color:var(--gold); font-family:'DM Sans',sans-serif; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; font-weight:400; display:flex; align-items:center; gap:8px; transition:all .2s; }
    /* CART */
    .cart-bar { position:fixed; bottom:0;left:0;right:0; z-index:9998; padding:12px 18px calc(12px + env(safe-area-inset-bottom)); background:linear-gradient(to top,var(--bg) 60%,transparent); transform:translateY(100%); transition:transform .35s cubic-bezier(.32,.72,0,1); }
    .cart-bar.show { transform:translateY(0); }
    .cart-btn { width:100%; padding:17px 22px; border-radius:16px; background:var(--turq); border:none; color:var(--bg); font-family:'DM Sans',sans-serif; font-size:.76rem; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:space-between; font-weight:500; box-shadow:0 8px 30px rgba(31,217,192,.25); transition:all .2s; }
    .cart-btn:active { background:var(--gold); }
    .cart-left { display:flex; align-items:center; gap:12px; }
    .cart-dot { width:26px;height:26px; background:rgba(6,9,14,.25); border-radius:50%; display:flex;align-items:center;justify-content:center; font-size:.72rem; font-weight:500; }
    .cart-price { font-family:'Playfair Display',serif; font-size:1rem; }
    /* ORDER */
    .order-ov { position:fixed;inset:0;background:rgba(6,9,14,.85);backdrop-filter:blur(12px);z-index:10000;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;align-items:flex-end; }
    .order-ov.open { opacity:1;pointer-events:all; }
    .order-panel { width:100%;background:var(--surface);border-radius:24px 24px 0 0;border-top:1px solid var(--border);max-height:86dvh;overflow-y:auto;transform:translateY(100%);transition:transform .36s cubic-bezier(.32,.72,0,1); }
    .order-ov.open .order-panel { transform:translateY(0); }
    .op-handle { width:38px;height:4px;background:var(--border);border-radius:2px;margin:13px auto 0; }
    .op-head { display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1; }
    .op-title { font-family:'Playfair Display',serif;font-size:1.15rem; }
    .op-close { width:34px;height:34px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted); }
    .op-body { padding:18px 22px; }
    .op-item { display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border); }
    .op-ico { width:44px;height:44px;background:var(--surface2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0; }
    .op-info { flex:1; }
    .op-name { font-size:.85rem;margin-bottom:3px; }
    .op-price { font-size:.68rem;color:var(--gold); }
    .op-rm { background:none;border:none;color:var(--muted);font-size:.65rem;padding:4px 8px;border-radius:8px;cursor:pointer; }
    .op-note { margin:18px 0;padding:14px;background:var(--surface2);border-radius:12px;border:1px solid var(--border); }
    .op-note-lbl { font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;color:var(--turq);margin-bottom:8px; }
    .op-note textarea { width:100%;background:none;border:none;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:300;resize:none;outline:none;min-height:55px; }
    .op-note textarea::placeholder { color:var(--muted); }
    .op-total { display:flex;justify-content:space-between;align-items:center;padding:18px 0 0; }
    .op-total-lbl { font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted); }
    .op-total-amt { font-family:'Playfair Display',serif;font-size:1.55rem;color:var(--gold); }
    .op-total-amt small { font-family:'DM Sans',sans-serif;font-size:.5rem;color:var(--muted); }
    .btn-waiter { width:100%;margin-top:18px;padding:16px;border-radius:14px;background:rgba(212,168,71,.1);border:1px solid rgba(212,168,71,.25);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:all .2s; }
    .btn-confirm { width:100%;padding:17px;border-radius:14px;background:var(--turq);border:none;color:var(--bg);font-family:'DM Sans',sans-serif;font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-weight:500;transition:all .2s;margin-bottom:22px; }
    .btn-confirm:active { background:var(--gold); }
    /* TOAST */
    .toast { position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--surface);border:1px solid var(--turq);border-radius:22px;padding:9px 20px;font-size:.68rem;color:var(--turq);z-index:10002;white-space:nowrap;display:flex;align-items:center;gap:8px;transition:transform .35s cubic-bezier(.32,.72,0,1);box-shadow:0 4px 20px rgba(31,217,192,.2); }
    .toast.show { transform:translateX(-50%) translateY(0); }
    /* SUCCESS */
    .success { position:fixed;inset:0;background:var(--bg);z-index:10003;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;opacity:0;pointer-events:none;transition:opacity .4s; }
    .success.open { opacity:1;pointer-events:all; }
    .success-ico { font-size:4rem;margin-bottom:18px;animation:pop .5s cubic-bezier(.32,.72,0,1); }
    @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
    .success h2 { font-family:'Playfair Display',serif;font-size:1.7rem;margin-bottom:10px; }
    .success p { font-size:.75rem;color:var(--muted);line-height:2;margin-bottom:28px; }
    .success-order { font-family:'Playfair Display',serif; font-size:1rem; color:var(--turq); margin-bottom:20px; }
    .success-back { padding:14px 32px;border-radius:22px;background:var(--turq);border:none;color:var(--bg);font-family:'DM Sans',sans-serif;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;font-weight:500; }

    /* ── RESPONSIVE 320-430px ── */
    @media (max-width:390px) {
      header { padding:14px 14px 0; }
      .brand-name { font-size:.95rem; }
      .table-pill { font-size:.5rem; padding:5px 10px; }
      .search-wrap input { font-size:.8rem; padding:11px 14px 11px 40px; }
      .cats-scroll { margin:0 -14px; padding:0 14px; }
      .menu-scroll { padding:0 14px 120px; }

      .card { border-radius:14px; }
      .card-visual { width:80px; min-height:80px; }
      .card-emoji.card-emoji { font-size:2.5rem; }
      .card-info { padding:12px 10px 12px 12px; }
      .card-name { font-size:.9rem; }
      .card-desc { font-size:.58rem; }
      .card-price { font-size:.95rem; }
      .add-quick { width:28px; height:28px; font-size:1.1rem; }

      .sheet-hero { height:180px; }
      .sh-emoji-main { font-size:4.2rem; }
      .sh-name { font-size:1.4rem; }
      .sheet-body { padding:18px 18px 30px; }

      .op-head { padding:14px 18px; }
      .op-body { padding:14px 18px; }

      .cart-bar { padding:10px 14px calc(10px + env(safe-area-inset-bottom)); }
      .cart-btn { padding:14px 18px; font-size:.68rem; }

      .success { padding:30px 20px; }
      .success h2 { font-size:1.4rem; }
    }

    @media (max-width:320px) {
      .card-visual { width:70px; min-height:70px; font-size:2.2rem; }
      .card-name { font-size:.85rem; }
      .sh-actions { flex-direction:column; gap:10px; }
      .add-main { text-align:center; justify-content:center; gap:10px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="ambient"><div class="blob b1"></div><div class="blob b2"></div></div>
  <header>
    <div class="header-top">
      <a class="brand-name" href="/" style="text-decoration:none;color:inherit;cursor:pointer;">Bahia <span>Beach Club</span></a>
      <div class="table-pill" id="tablePill">Table —</div>
    </div>
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input id="searchInput" type="text" placeholder="Chercher un plat, cocktail…"/>
    </div>
    <div class="cats-scroll"><div class="cats" id="cats"></div></div>
  </header>
  <div class="menu-scroll" id="menuScroll"></div>
  <div class="cart-bar" id="cartBar">
    <button class="cart-btn" id="cartBtn">
      <div class="cart-left"><div class="cart-dot" id="cartCount">0</div><span>Voir ma commande</span></div>
      <span class="cart-price" id="cartTotal">0 FCFA</span>
    </button>
  </div>
</div>

<!-- SHEET DÉTAIL -->
<div class="sheet-ov" id="sheetOv">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hero">
      <div class="sh-bg" id="shBg"></div>
      <div class="sh-emoji-back" id="shEmojiBack"></div>
      <div class="sh-fade"></div>
      <div class="sh-emoji-main" id="shEmoji"></div>
    </div>
    <div class="sheet-body">
      <div class="sh-head"><div class="sh-name" id="shName"></div><button class="sh-close" id="shClose">✕</button></div>
      <div class="sh-cat" id="shCat"></div>
      <div class="sh-desc" id="shDesc"></div>
      <div class="chips-lbl">Ingrédients</div>
      <div class="chips" id="shChips"></div>
      <div class="intensity" id="shInt">
        <span class="int-lbl">Intensité alcool</span>
        <div class="int-dots" id="shDots"></div>
      </div>
      <button class="ar-visualize" id="shArBtn"><span>✦</span> Voir en Réalité Augmentée 3D</button>
      <div class="sh-actions">
        <div class="qty">
          <button class="qty-btn" id="qtyM">−</button>
          <span class="qty-n" id="qtyN">1</span>
          <button class="qty-btn" id="qtyP">+</button>
        </div>
        <button class="add-main" id="shAddBtn">
          <span>Ajouter</span>
          <span class="add-main-price" id="shAddPrice"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- AR SCREEN -->
<div class="ar-screen" id="arScreen">
  <div class="ar-topbar">
    <button class="ar-back-btn" id="arBack">← Retour</button>
    <div class="ar-topbar-title" id="arTitle"></div>
    <div class="ar-topbar-price" id="arPrice"></div>
  </div>
  <div class="mv-wrap">
    <div class="mv-loading" id="mvLoading">
      <div class="mv-spinner"></div>
      <div class="mv-loading-txt">Chargement 3D…</div>
    </div>
    <model-viewer id="modelViewer" shadow-intensity="1" camera-controls touch-action="pan-y" auto-rotate ar ar-modes="webxr scene-viewer quick-look" environment-image="neutral" exposure="1.2" style="width:100%;height:100%;"></model-viewer>
  </div>
  <div class="mv-hint">
    <div class="mv-hint-txt"><div class="mv-hint-dot"></div> Modèle 3D interactif · Glisser pour pivoter</div>
    <div class="ar-launch-row">
      <button class="btn-ar-real" id="btnArLaunch">✦ Lancer la vraie AR</button>
      <button class="btn-add-ar" id="btnAddAr">+ Ajouter</button>
    </div>
  </div>
</div>

<!-- ORDER PANEL -->
<div class="order-ov" id="orderOv">
  <div class="order-panel">
    <div class="op-handle"></div>
    <div class="op-head"><div class="op-title">Ma commande</div><button class="op-close" id="opClose">✕</button></div>
    <div class="op-body">
      <div id="opItems"></div>
      <div class="op-note">
        <div class="op-note-lbl">Note pour le serveur</div>
        <textarea id="orderNote" placeholder="Sans glaçons, allergie aux noix…"></textarea>
      </div>
      <div class="op-total">
        <span class="op-total-lbl">Total estimé</span>
        <span class="op-total-amt" id="opTotal">0 <small>FCFA</small></span>
      </div>
      <button class="btn-waiter" id="btnWaiter">🔔 Appeler le serveur</button>
      <button class="btn-confirm" id="btnConfirm">Confirmer la commande</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ <span id="toastTxt"></span></div>

<div class="success" id="successEl">
  <div class="success-ico">🥂</div>
  <h2>Commande envoyée !</h2>
  <div class="success-order" id="successOrderId"></div>
  <p>Votre serveur arrive dans quelques instants.<br>Profitez de la vue sur l'Atlantique.</p>
  <button class="success-back" id="successBack">Continuer à parcourir</button>
</div>

<script>
// ═══════════════════════════════
// CONFIG
// ═══════════════════════════════
const API = window.location.origin + '/api';
const DEFAULT_MODEL = 'https://modelviewer.dev/shared-assets/models/Astronaut.glb';

// Récupère le numéro de table depuis l'URL (?table=7)
const urlParams = new URLSearchParams(window.location.search);
const TABLE_NUMBER = parseInt(urlParams.get('table')) || 1;
document.getElementById('tablePill').textContent = `Table ${TABLE_NUMBER}`;
document.title = `Bahia Beach Club · Table ${TABLE_NUMBER}`;

// ═══════════════════════════════
// CATÉGORIES
// ═══════════════════════════════
const CATS = [
  {id:'all',        label:'Tout',              icon:'✦'},
  {id:'mocktails',  label:'Mocktails',         icon:'🌟'},
  {id:'cocktails',  label:'Cocktails',         icon:'🍹'},
  {id:'softs',      label:'Softs & Eaux',      icon:'💧'},
  {id:'jus',        label:'Jus',               icon:'🍊'},
  {id:'bieres',     label:'Bières',            icon:'🍺'},
  {id:'shooters',   label:'Shooters',          icon:'🥃'},
  {id:'whisky',     label:'Whisky',            icon:'🥃'},
  {id:'alcools',    label:'Alcools',           icon:'🍷'},
  {id:'liqueurs',   label:'Liqueurs',          icon:'🌿'},
  {id:'digestifs',  label:'Digestifs',         icon:'🥃'},
  {id:'entrees',    label:'Entrées',           icon:'🥗'},
  {id:'partager',   label:'À Partager',        icon:'🤝'},
  {id:'plats',      label:'Nos Plats',         icon:'🍽️'},
  {id:'grillades',  label:'Grillades',         icon:'🔥'},
  {id:'pates',      label:'Pâtes',             icon:'🍝'},
  {id:'burgers',    label:'Burgers & Sandwichs',icon:'🍔'},
  {id:'plats_jour', label:'Plats du Jour',     icon:'📅'},
  {id:'desserts',   label:'Desserts',          icon:'🍮'},
  {id:'enfants',    label:'Menu Enfants',      icon:'👶'},
];
const CAT_LABELS = Object.fromEntries(CATS.map(c=>[c.id,c.label]));

// ═══════════════════════════════
// STATE
// ═══════════════════════════════
let activeCat = 'all';
let searchQ   = '';
let allItems  = [];
let cart      = [];
let activeItem = null;
let qty       = 1;

const fmt = p => Number(p).toLocaleString('fr-FR') + ' FCFA';
const $ = id => document.getElementById(id);

// ═══════════════════════════════
// CATS
// ═══════════════════════════════
const catsEl = $('cats');
CATS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'cat' + (c.id === activeCat ? ' active' : '');
  btn.innerHTML = `<span>${c.icon}</span>${c.label}`;
  btn.onclick = () => {
    activeCat = c.id;
    document.querySelectorAll('.cat').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMenu();
  };
  catsEl.appendChild(btn);
});

$('searchInput').addEventListener('input', e => { searchQ = e.target.value.toLowerCase(); renderMenu(); });

// ═══════════════════════════════
// CHARGER LE MENU DEPUIS L'API
// ═══════════════════════════════
async function loadMenu() {
  $('menuScroll').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-txt">Chargement du menu…</div>
    </div>`;
  try {
    const res = await fetch(`${API}/menu`);
    allItems = await res.json();
    renderMenu();
  } catch (err) {
    $('menuScroll').innerHTML = `<div class="empty"><span>⚠️</span><p>Impossible de charger le menu.<br>Vérifiez que le serveur tourne sur le port 3001.</p></div>`;
  }
}

// ═══════════════════════════════
// RENDU MENU
// ═══════════════════════════════
function renderMenu() {
  const el = $('menuScroll');
  let items = allItems.filter(i => {
    const catOk = activeCat === 'all' || i.cat === activeCat;
    const srOk  = !searchQ || i.name.toLowerCase().includes(searchQ) || i.desc.toLowerCase().includes(searchQ);
    return catOk && srOk;
  });

  if (!items.length) {
    el.innerHTML = `<div class="empty"><span>🔍</span><p>Aucun résultat pour "<b>${searchQ}</b>"</p></div>`;
    return;
  }

  let html = '';
  if (activeCat === 'all' && !searchQ) {
    CATS.filter(c => c.id !== 'all').forEach(c => {
      const grp = items.filter(i => i.cat === c.id);
      if (!grp.length) return;
      html += `<div class="sec">${c.icon} ${c.label}</div>`;
      grp.forEach(i => html += cardHtml(i));
    });
  } else {
    html += `<div class="sec">${searchQ ? 'Résultats' : CAT_LABELS[activeCat]}</div>`;
    items.forEach(i => html += cardHtml(i));
  }

  el.innerHTML = html;
}

function cardHtml(item) {
  const grad = item.grad || 'linear-gradient(135deg,rgba(31,217,192,.1),rgba(0,0,0,.2))';
  const badges = [
    item.ar   ? `<span class="badge badge-ar">✦ AR 3D</span>` : '',
    item.isNew ? `<span class="badge badge-new">Nouveau</span>` : ''
  ].join('');
  return `<div class="card" data-id="${item.id}">
    <div class="card-visual"><div class="card-visual-bg" style="background:${grad}"></div><div class="card-emoji">${item.emoji}</div></div>
    <div class="card-info">
      <div>
        <div class="card-row1"><div class="card-name">${item.name}</div><div class="card-badges">${badges}</div></div>
        <div class="card-desc">${item.desc}</div>
      </div>
      <div class="card-bottom">
        <div>
          <div class="card-price">${fmt(item.price)}</div>
          ${item.ar ? `<div class="card-ar-hint">✦ Voir en AR 3D</div>` : ''}
        </div>
        <button class="add-quick" data-id="${item.id}">+</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════
// SHEET DÉTAIL
// ═══════════════════════════════
function openSheet(id) {
  console.log('openSheet called', id);
  activeItem = allItems.find(i => i.id === id);
  if (!activeItem) return;
  qty = 1; updateQty();
  $('shBg').style.background = activeItem.grad || 'linear-gradient(135deg,rgba(31,217,192,.1),rgba(0,0,0,.3))';
  $('shEmojiBack').textContent = activeItem.emoji;
  $('shEmoji').textContent     = activeItem.emoji;
  $('shName').textContent      = activeItem.name;
  $('shCat').textContent       = CAT_LABELS[activeItem.cat] || '';
  $('shDesc').textContent      = activeItem.desc;
  $('shChips').innerHTML = (activeItem.ingr || []).map(i => `<div class="chip"><div class="chip-dot"></div>${i}</div>`).join('');
  const intEl = $('shInt');
  if (activeItem.intensity > 0) {
    intEl.style.display = 'flex';
    $('shDots').innerHTML = Array.from({length:5}, (_,i) => `<div class="int-dot${i < activeItem.intensity ? ' on' : ''}"></div>`).join('');
  } else intEl.style.display = 'none';
  $('shArBtn').style.display = activeItem.ar ? 'flex' : 'none';
  $('sheetOv').classList.add('open');
}

$('shClose').onclick = () => $('sheetOv').classList.remove('open');
$('sheetOv').addEventListener('click', e => { if (e.target === $('sheetOv')) $('sheetOv').classList.remove('open'); });
function updateQty() { $('qtyN').textContent = qty; $('shAddPrice').textContent = fmt(activeItem.price * qty); }
$('qtyM').onclick = () => { if (qty > 1) { qty--; updateQty(); } };
$('qtyP').onclick = () => { qty++; updateQty(); };
$('shAddBtn').onclick = () => { addToCart(activeItem, qty); $('sheetOv').classList.remove('open'); showToast(`${activeItem.name} ajouté`); };

// ═══════════════════════════════
// AR
// ═══════════════════════════════
const mv = $('modelViewer');
$('shArBtn').onclick = () => {
  if (!activeItem) return;
  $('arTitle').textContent = activeItem.name;
  $('arPrice').textContent = fmt(activeItem.price);
  $('sheetOv').classList.remove('open');
  $('arScreen').classList.add('open');
  $('mvLoading').classList.remove('hidden');
  mv.src = activeItem.modelUrl && activeItem.modelUrl !== '' ? `${window.location.origin}${activeItem.modelUrl}` : DEFAULT_MODEL;
  mv.addEventListener('load', () => $('mvLoading').classList.add('hidden'), {once:true});
};
$('arBack').onclick = () => { $('arScreen').classList.remove('open'); mv.src = ''; if (activeItem) openSheet(activeItem.id); };
$('btnArLaunch').onclick = () => { if (mv?.activateAR) mv.activateAR(); else showToast('AR non disponible sur cet appareil'); };
$('btnAddAr').onclick = () => { if (!activeItem) return; addToCart(activeItem, 1); $('arScreen').classList.remove('open'); showToast(`${activeItem.name} ajouté`); };

// ═══════════════════════════════
// PANIER
// ═══════════════════════════════
function quickAdd(id) { const item = allItems.find(i => i.id === id); if (!item) return; addToCart(item, 1); showToast(`${item.name} ajouté`); }
function addToCart(item, q) { const ex = cart.find(c => c.id === item.id); if (ex) ex.qty += q; else cart.push({...item, qty:q}); updateCartBar(); }
function updateCartBar() {
  const count = cart.reduce((s,c) => s+c.qty, 0);
  const total = cart.reduce((s,c) => s+c.price*c.qty, 0);
  $('cartCount').textContent = count;
  $('cartTotal').textContent = fmt(total);
  $('cartBar').classList.toggle('show', cart.length > 0);
}
$('cartBtn').onclick = openOrder;

// ═══════════════════════════════
// COMMANDE
// ═══════════════════════════════
function openOrder() {
  $('opItems').innerHTML = cart.map(c => `
    <div class="op-item">
      <div class="op-ico">${c.emoji}</div>
      <div class="op-info">
        <div class="op-name">${c.qty > 1 ? c.qty+'× ' : ''}${c.name}</div>
        <div class="op-price">${fmt(c.price * c.qty)}</div>
      </div>
      <button class="op-rm" data-id="${c.id}">Retirer</button>
    </div>`).join('');
  const total = cart.reduce((s,c) => s+c.price*c.qty, 0);
  $('opTotal').innerHTML = `${total.toLocaleString('fr-FR')} <small>FCFA</small>`;
  $('orderOv').classList.add('open');
  document.querySelectorAll('.op-rm').forEach(btn => {
    btn.onclick = () => {
      cart = cart.filter(c => c.id !== btn.dataset.id);
      updateCartBar();
      if (!cart.length) $('orderOv').classList.remove('open');
      else openOrder();
    };
  });
}
$('opClose').onclick = () => $('orderOv').classList.remove('open');
$('orderOv').addEventListener('click', e => { if (e.target === $('orderOv')) $('orderOv').classList.remove('open'); });

$('btnWaiter').onclick = () => { showToast('Serveur appelé ! Il arrive…'); $('orderOv').classList.remove('open'); };

$('btnConfirm').onclick = async () => {
  const note = $('orderNote').value;
  const items = cart.map(c => ({ id:c.id, name:c.name, price:c.price, qty:c.qty }));
  try {
    const res = await fetch(`${API}/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tableNumber: TABLE_NUMBER, items, note })
    });
    const order = await res.json();
    $('orderOv').classList.remove('open');
    $('successOrderId').textContent = `Commande #${order.id?.slice(-6).toUpperCase() || '—'}`;
    setTimeout(() => { $('successEl').classList.add('open'); cart = []; updateCartBar(); }, 300);
  } catch {
    showToast('Erreur réseau — serveur déconnecté ?');
  }
};
$('successBack').onclick = () => $('successEl').classList.remove('open');

// ═══════════════════════════════
// TOAST
// ═══════════════════════════════
let toastT;
function showToast(msg) {
  $('toastTxt').textContent = msg;
  $('toast').classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => $('toast').classList.remove('show'), 2200);
}

// ═══════════════════════════════
// EVENT DELEGATION — menu cards
// Capture phase pour fiabilité mobile Android
// ═══════════════════════════════
document.addEventListener('click', function(e) {
  const addBtn = e.target.closest('.add-quick');
  if (addBtn) {
    e.preventDefault();
    e.stopPropagation();
    quickAdd(addBtn.dataset.id);
    return;
  }
  const card = e.target.closest('.card');
  if (card && !e.target.closest('.add-quick')) {
    e.preventDefault();
    openSheet(card.dataset.id);
    return;
  }
}, true);

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
loadMenu();
</script>
</body>
</html>
