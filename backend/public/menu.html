<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bahia Beach Club · Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #FDFAF5;
      --surface:  #F5EFE4;
      --surface2: #EDE5D6;
      --border:   rgba(201,169,110,0.2);
      --turq:     #C9A96E;
      --gold:     #A8884E;
      --white:    #F5EFE4;
      --muted:    rgba(61,46,20,0.45);
      --brun-profond: #3D2E14;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--brun-profond);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── LAYOUT WRAPPER ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── SIDEBAR (= header on mobile/tablet) ── */
    #sidebar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--brun-profond);
      padding: 14px 16px 0;
      border-bottom: 1px solid rgba(201,169,110,0.25);
      flex-shrink: 0;
    }
    #sidebar-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      text-decoration: none;
      color: var(--or-clair, #E8D5A3);
    }
    .brand em { color: var(--turq); font-style: italic; }
    .table-pill {
      font-size: .5rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      background: var(--turq);
      color: #FDFAF5;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ── SEARCH ── */
    #search-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    #search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid rgba(201,169,110,0.3);
      border-radius: 12px;
      padding: 11px 14px 11px 40px;
      color: var(--brun-profond);
      font-family: 'DM Sans', sans-serif;
      font-size: .84rem;
      font-weight: 300;
      outline: none;
      transition: border-color .2s;
    }
    #search-wrap input:focus { border-color: rgba(201,169,110,.5); }
    #search-wrap input::placeholder { color: rgba(61,46,20,0.4); }
    #search-ico {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: .9rem;
    }
    /* Sidebar-only label above cats on desktop */
    .cats-section-lbl {
      display: none;
      font-size: .42rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(232,213,163,0.5);
      margin-bottom: 10px;
    }

    /* ── CATÉGORIES ── */
    #cats-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin: 0 -16px;
      padding: 0 16px;
    }
    #cats-scroll::-webkit-scrollbar { display: none; }
    #cats {
      display: flex;
      gap: 7px;
      padding-bottom: 12px;
      width: max-content;
    }
    .cat-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid #D3CEBF;
      background: var(--surface);
      color: #7A5C30;
      font-family: 'DM Sans', sans-serif;
      font-size: .64rem;
      letter-spacing: .04em;
      white-space: nowrap;
      cursor: pointer;
      touch-action: manipulation;
      min-height: 34px;
      transition: background .18s, color .18s, border-color .18s;
    }
    .cat-btn.active {
      background: var(--turq);
      border-color: var(--turq);
      color: #FDFAF5;
      font-weight: 500;
    }

    /* ── MAIN CONTENT ── */
    #main-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }
    #menu-list { padding: 12px 16px 140px; }

    .section-title {
      font-size: .46rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--turq);
      margin: 18px 0 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(201,169,110,0.25);
    }

    /* ── CARDS GRID (no grid on mobile — natural flow) ── */
    .cards-grid { margin-bottom: 4px; }

    /* ── CARD ── */
    .card {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 9px;
      overflow: hidden;
      cursor: pointer;
      touch-action: manipulation;
      min-height: 90px;
      transition: opacity .15s, transform .15s, border-color .2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .card:active { opacity: .85; transform: scale(.99); }
    .card-visual {
      width: 88px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.7rem;
      position: relative;
      overflow: hidden;
    }
    .card-visual-bg { position: absolute; inset: 0; }
    .card-emoji { position: relative; z-index: 1; }
    .card-info {
      flex: 1;
      padding: 12px 11px 12px 13px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }
    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: .92rem;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: .58rem;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      color: rgba(61,46,20,0.55);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
      margin-bottom: 8px;
    }
    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-price {
      font-family: 'Playfair Display', serif;
      font-size: .98rem;
      color: var(--gold);
    }
    .badge-new {
      font-size: .34rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 6px;
      border: 1px solid rgba(201,169,110,.35);
      color: var(--turq);
    }
    .add-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--turq);
      border: none;
      color: #FDFAF5;
      font-size: 1.15rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      flex-shrink: 0;
      transition: background .15s, transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { background: var(--gold); transform: scale(.88); }

    /* ── BOTTOM SHEET ── */
    #sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30,20,8,.6);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease;
    }
    #sheet-overlay.open { opacity: 1; pointer-events: all; }

    #sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1001;
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid var(--border);
      max-height: 88dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transform: translateY(100%);
      transition: transform .3s ease;
    }
    #sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .sheet-hero {
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      position: relative;
      overflow: hidden;
    }
    .sheet-hero-bg { position: absolute; inset: 0; }
    .sheet-hero-emoji { position: relative; z-index: 1; }
    .sheet-hero-close {
      position: absolute;
      top: 12px;
      right: 14px;
      z-index: 2;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(30,20,8,.55);
      border: 1px solid rgba(201,169,110,0.3);
      color: #F5EFE4;
      font-size: .8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
    }
    #sheet-body { padding: 18px 20px 30px; }
    #sh-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      line-height: 1.15;
      margin-bottom: 4px;
    }
    #sh-cat {
      font-size: .48rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--turq);
      margin-bottom: 12px;
    }
    #sh-desc {
      font-size: .82rem;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      color: rgba(61,46,20,0.65);
      line-height: 1.9;
      margin-bottom: 16px;
    }
    .ingr-label {
      font-size: .46rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    #sh-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }
    .chip {
      padding: 5px 12px;
      border-radius: 18px;
      border: 1px solid var(--border);
      font-size: .58rem;
      background: var(--surface2);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .chip-dot { width: 5px; height: 5px; background: var(--turq); border-radius: 50%; }
    .sh-actions { display: flex; align-items: center; gap: 10px; }
    .qty-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border-radius: 12px;
      padding: 7px 14px;
    }
    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--brun-profond);
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      min-height: 28px;
      transition: background .15s;
    }
    .qty-btn:active { background: var(--turq); color: var(--bg); }
    #sh-qty {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      min-width: 18px;
      text-align: center;
    }
    #sh-add {
      flex: 1;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--turq);
      border: none;
      color: #FDFAF5;
      font-family: 'DM Sans', sans-serif;
      font-size: .68rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background .15s;
    }
    #sh-add:active { background: var(--gold); }
    #sh-add-price { font-family: 'Playfair Display', serif; font-size: .9rem; }

    /* ── CART BAR ── */
    #cart-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 900;
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, #FDFAF5 65%, transparent);
      transform: translateY(100%);
      transition: transform .3s ease;
    }
    #cart-bar.show { transform: translateY(0); }
    #cart-btn {
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      background: var(--brun-profond);
      border: none;
      color: #E8D5A3;
      font-family: 'DM Sans', sans-serif;
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 6px 24px rgba(61,46,20,.25);
      transition: background .15s;
    }
    #cart-btn:active { background: var(--gold); }
    .cart-left { display: flex; align-items: center; gap: 10px; }
    .cart-count {
      width: 24px;
      height: 24px;
      background: rgba(6,9,14,.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .68rem;
      font-weight: 500;
    }
    #cart-total { font-family: 'Playfair Display', serif; font-size: .95rem; }

    /* ── ORDER PANEL ── */
    #order-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30,20,8,.65);
      z-index: 1100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease;
    }
    #order-overlay.open { opacity: 1; pointer-events: all; }
    #order-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1101;
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid var(--border);
      max-height: 88dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transform: translateY(100%);
      transition: transform .3s ease;
    }
    #order-panel.open { transform: translateY(0); }
    .op-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
    .op-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }
    .op-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
    #op-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: .8rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
    }
    #op-body { padding: 16px 20px; }
    .op-item { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
    .op-emoji { width: 40px; height: 40px; background: var(--surface2); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .op-info { flex: 1; }
    .op-name { font-size: .82rem; margin-bottom: 2px; }
    .op-price { font-size: .64rem; color: var(--gold); }
    .op-rm { background: none; border: none; color: var(--muted); font-size: .58rem; padding: 4px 8px; border-radius: 8px; cursor: pointer; touch-action: manipulation; min-height: 32px; min-width: 48px; }
    .op-note { margin: 16px 0; padding: 13px; background: var(--surface2); border-radius: 11px; border: 1px solid var(--border); }
    .op-note-lbl { font-size: .44rem; letter-spacing: .2em; text-transform: uppercase; color: var(--turq); margin-bottom: 7px; }
    .op-note textarea { width: 100%; background: none; border: none; color: var(--brun-profond); font-family: 'DM Sans', sans-serif; font-size: .75rem; font-weight: 300; resize: none; outline: none; min-height: 50px; }
    .op-note textarea::placeholder { color: var(--muted); }
    .op-total { display: flex; justify-content: space-between; align-items: center; padding: 16px 0 0; }
    .op-total-lbl { font-size: .54rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .op-total-amt { font-family: 'Playfair Display', serif; font-size: 1.45rem; color: var(--turq); }
    .op-total-amt small { font-family: 'DM Sans', sans-serif; font-size: .48rem; color: var(--muted); }
    #btn-waiter {
      width: 100%; margin-top: 16px; padding: 14px; border-radius: 12px;
      background: rgba(201,169,110,.1); border: 1px solid rgba(201,169,110,.25);
      color: var(--turq); font-family: 'DM Sans', sans-serif; font-size: .68rem;
      letter-spacing: .08em; text-transform: uppercase; cursor: pointer;
      touch-action: manipulation; min-height: 48px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 8px; transition: background .15s;
    }
    #btn-confirm {
      width: 100%; padding: 15px; border-radius: 12px;
      background: var(--turq); border: none; color: #FDFAF5;
      font-family: 'DM Sans', sans-serif; font-size: .72rem;
      letter-spacing: .1em; text-transform: uppercase; font-weight: 500;
      cursor: pointer; touch-action: manipulation; min-height: 50px;
      margin-bottom: 20px; transition: background .15s;
    }
    #btn-confirm:active { background: var(--gold); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--surface);
      border: 1px solid var(--turq);
      border-radius: 20px;
      padding: 8px 18px;
      font-size: .64rem;
      color: var(--turq);
      z-index: 2000;
      white-space: nowrap;
      display: flex; align-items: center; gap: 7px;
      transition: transform .3s ease;
      box-shadow: 0 4px 18px rgba(201,169,110,.25);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── SUCCESS ── */
    #success {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 2100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 40px 30px;
      opacity: 0; pointer-events: none; transition: opacity .35s;
    }
    #success.open { opacity: 1; pointer-events: all; }
    .success-ico { font-size: 3.8rem; margin-bottom: 16px; }
    #success h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 8px; }
    #success-order { font-family: 'Playfair Display', serif; font-size: .95rem; color: var(--turq); margin-bottom: 14px; }
    #success p { font-size: .72rem; color: var(--muted); line-height: 1.9; margin-bottom: 26px; }
    #success-back {
      padding: 13px 30px; border-radius: 20px; background: var(--turq);
      border: none; color: #FDFAF5; font-family: 'DM Sans', sans-serif;
      font-size: .64rem; letter-spacing: .14em; text-transform: uppercase;
      font-weight: 500; cursor: pointer; touch-action: manipulation; min-height: 48px;
    }

    /* ── ÉTATS ── */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 14px; }
    .spinner { width: 36px; height: 36px; border: 2px solid rgba(201,169,110,0.2); border-top-color: var(--turq); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-txt { font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--turq); }
    .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty-ico { font-size: 2.8rem; margin-bottom: 12px; }
    .empty p { font-size: .72rem; line-height: 1.8; }

    /* ── MENU TABS (Restaurant / Bar) ── */
    .menu-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
      border-bottom: 2px solid rgba(201,169,110,0.2);
    }
    .menu-tab {
      flex: 1;
      padding: 12px 6px;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      color: rgba(232,213,163,0.5);
      cursor: pointer;
      letter-spacing: 0.05em;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.3s ease;
      touch-action: manipulation;
    }
    .menu-tab.active {
      color: #C9A96E;
      border-bottom-color: #C9A96E;
    }

    /* ── CARD INITIAL ── */
    .card-initial {
      position: relative;
      z-index: 2;
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: #E8D5A3;
      opacity: 0.85;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    /* Cat button icon discret */
    .cat-btn > span:first-child {
      font-size: 0.85rem;
      filter: grayscale(30%) opacity(0.75);
    }

    /* ════════════════════════════════════════
       TABLETTE  ≥ 768px
    ════════════════════════════════════════ */
    @media (min-width: 768px) {
      #sidebar { padding: 16px 24px 0; }
      .brand { font-size: 1.15rem; }

      /* Grille 2 colonnes */
      .cards-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 4px;
      }
      .card { margin-bottom: 0; }

      /* Sheet centrée */
      #sheet {
        left: 50%;
        right: auto;
        width: 560px;
        transform: translateX(-50%) translateY(100%);
        border-radius: 24px 24px 0 0;
      }
      #sheet.open { transform: translateX(-50%) translateY(0); }

      /* Order panel centré */
      #order-panel {
        left: 50%;
        right: auto;
        width: 560px;
        transform: translateX(-50%) translateY(100%);
        border-radius: 24px 24px 0 0;
      }
      #order-panel.open { transform: translateX(-50%) translateY(0); }

      /* Cart bar centrée */
      #cart-bar {
        left: 50%;
        right: auto;
        width: 560px;
        transform: translateX(-50%) translateY(100%);
      }
      #cart-bar.show { transform: translateX(-50%) translateY(0); }
    }

    /* ════════════════════════════════════════
       DESKTOP  ≥ 1024px
    ════════════════════════════════════════ */
    @media (min-width: 1024px) {
      html, body { overflow: hidden; height: 100%; }

      #app {
        flex-direction: row;
        height: 100vh;
        overflow: hidden;
      }

      /* Sidebar fixe à gauche */
      #sidebar {
        position: relative;
        top: auto;
        width: 290px;
        flex-shrink: 0;
        height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
        border-bottom: none;
        border-right: 1px solid rgba(201,169,110,0.25);
        padding: 32px 22px 32px;
        background: linear-gradient(180deg, #3D2E14 0%, #2A1F0A 100%);
        display: flex;
        flex-direction: column;
        scrollbar-width: none;
      }
      #sidebar::-webkit-scrollbar { display: none; }

      /* Brand + table en colonne */
      #sidebar-top {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 0;
        padding-bottom: 22px;
        border-bottom: 1px solid rgba(201,169,110,0.25);
        margin-bottom: 22px;
      }
      .brand { font-size: 1.3rem; }
      .table-pill { font-size: .48rem; }

      /* Search */
      #search-wrap { margin-bottom: 20px; }
      #search-wrap input { font-size: .8rem; padding: 10px 14px 10px 38px; }

      /* Label "Catégories" au-dessus des pills */
      .cats-section-lbl { display: block; }

      /* Cats en colonne verticale */
      #cats-scroll {
        overflow-x: visible;
        overflow-y: visible;
        margin: 0;
        padding: 0;
        flex: 1;
      }
      #cats {
        flex-direction: column;
        width: auto;
        gap: 3px;
        padding-bottom: 0;
      }
      .cat-btn {
        width: 100%;
        border-radius: 10px;
        justify-content: flex-start;
        padding: 9px 14px;
        min-height: 38px;
        font-size: .66rem;
      }
      .cat-btn.active { border-radius: 10px; }

      /* Zone principale scrollable */
      #main-content {
        flex: 1;
        height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      #main-content::-webkit-scrollbar { width: 5px; }
      #main-content::-webkit-scrollbar-track { background: transparent; }
      #main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

      #menu-list { padding: 24px 28px 120px; }
      .section-title { font-size: .44rem; }

      /* Grille 3 colonnes (auto-fill) */
      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 14px;
      }

      /* Cartes verticales */
      .card {
        flex-direction: column;
        min-height: auto;
        margin-bottom: 0;
        border-radius: 14px;
      }
      .card:hover { border-color: rgba(201,169,110,.5); transform: translateY(-2px); }
      .card:active { transform: scale(.99) translateY(0); }
      .card-visual {
        width: 100%;
        height: 115px;
        flex-shrink: 0;
        border-radius: 0;
        font-size: 3.2rem;
      }
      .card-info { padding: 13px 14px; }
      .card-name { font-size: .95rem; }
      .card-desc { -webkit-line-clamp: 3; font-size: .6rem; }
      .card-price { font-size: 1.02rem; }

      /* Sheet : boîte flottante centrée */
      #sheet {
        left: 50%;
        right: auto;
        width: 480px;
        bottom: 24px;
        border-radius: 20px;
        transform: translateX(-50%) translateY(calc(100% + 24px));
        max-height: 82vh;
      }
      #sheet.open { transform: translateX(-50%) translateY(0); }
      .sheet-handle { display: none; }

      /* Order panel : boîte flottante centrée */
      #order-panel {
        left: 50%;
        right: auto;
        width: 500px;
        bottom: 24px;
        border-radius: 20px;
        transform: translateX(-50%) translateY(calc(100% + 24px));
        max-height: 82vh;
      }
      #order-panel.open { transform: translateX(-50%) translateY(0); }
      .op-handle { display: none; }

      /* Cart bar centrée + plus large */
      #cart-bar {
        left: 50%;
        right: auto;
        width: 540px;
        transform: translateX(-50%) translateY(100%);
        padding: 14px 20px 14px;
      }
      #cart-bar.show { transform: translateX(-50%) translateY(0); }
    }

    /* ════════════════════════════════════════
       GRAND ÉCRAN  ≥ 1280px
    ════════════════════════════════════════ */
    @media (min-width: 1280px) {
      #sidebar { width: 310px; }
      .cards-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- SIDEBAR (header sur mobile/tablette, sidebar sur desktop) -->
  <div id="sidebar">
    <div id="sidebar-top">
      <a href="/" class="brand">Bahia <em>Beach Club</em></a>
      <div class="table-pill" id="table-pill">Table —</div>
    </div>
    <!-- ONGLETS RESTAURANT / BAR -->
    <div class="menu-tabs" id="menu-tabs">
      <button class="menu-tab active" data-menu="restaurant">🍽️ Restaurant</button>
      <button class="menu-tab" data-menu="bar">🍹 Bar</button>
    </div>

    <div id="search-wrap">
      <span id="search-ico">🔍</span>
      <input id="search-input" type="text" placeholder="Chercher un plat, cocktail…" autocomplete="off">
    </div>
    <div class="cats-section-lbl">Catégories</div>
    <div id="cats-scroll">
      <div id="cats"></div>
    </div>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div id="main-content">
    <div id="menu-list"></div>
  </div>

</div><!-- /#app -->

<!-- CART BAR -->
<div id="cart-bar">
  <button id="cart-btn">
    <div class="cart-left">
      <div class="cart-count" id="cart-count">0</div>
      <span>Voir ma commande</span>
    </div>
    <span id="cart-total">0 FCFA</span>
  </button>
</div>

<!-- BOTTOM SHEET DÉTAIL -->
<div id="sheet-overlay"></div>
<div id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hero" id="sheet-hero">
    <div class="sheet-hero-bg" id="sh-bg"></div>
    <div class="sheet-hero-emoji" id="sh-emoji"></div>
    <button class="sheet-hero-close" id="sh-close">✕</button>
  </div>
  <div id="sheet-body">
    <div id="sh-name"></div>
    <div id="sh-cat"></div>
    <div id="sh-desc"></div>
    <div class="ingr-label">Ingrédients</div>
    <div id="sh-chips"></div>
    <div class="sh-actions">
      <div class="qty-row">
        <button class="qty-btn" id="qty-minus">−</button>
        <span id="sh-qty">1</span>
        <button class="qty-btn" id="qty-plus">+</button>
      </div>
      <button id="sh-add">
        <span>Ajouter</span>
        <span id="sh-add-price"></span>
      </button>
    </div>
  </div>
</div>

<!-- ORDER PANEL -->
<div id="order-overlay"></div>
<div id="order-panel">
  <div class="op-handle"></div>
  <div class="op-head">
    <div class="op-title">Ma commande</div>
    <button id="op-close">✕</button>
  </div>
  <div id="op-body">
    <div id="op-items"></div>
    <div class="op-note">
      <div class="op-note-lbl">Note pour le serveur</div>
      <textarea id="order-note" placeholder="Sans glaçons, allergie aux noix…"></textarea>
    </div>
    <div class="op-total">
      <span class="op-total-lbl">Total estimé</span>
      <span class="op-total-amt" id="op-total">0 <small>FCFA</small></span>
    </div>
    <button id="btn-waiter">🔔 Appeler le serveur</button>
    <button id="btn-confirm">Confirmer la commande</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast">✓ <span id="toast-txt"></span></div>

<!-- SUCCESS -->
<div id="success">
  <div class="success-ico">🥂</div>
  <h2>Commande envoyée !</h2>
  <div id="success-order"></div>
  <p>Votre serveur arrive dans quelques instants.<br>Profitez de la vue sur l'Atlantique.</p>
  <button id="success-back">Continuer à parcourir</button>
</div>

<script>
'use strict';

// ── CONFIG ──────────────────────────────────────────────
const API   = window.location.origin + '/api';
const TABLE = parseInt(new URLSearchParams(window.location.search).get('table')) || 1;

document.getElementById('table-pill').textContent = 'Table ' + TABLE;
document.title = 'Bahia Beach Club · Table ' + TABLE;

// ── PARTITION RESTAURANT / BAR ──────────────────────────
const RESTAURANT_CATS = new Set([
  'petits_dej','tapas','entrees','partager','plats',
  'grillades','pates','burgers','plats_jour','desserts','enfants'
]);
const BAR_CATS = new Set([
  'mocktails','cocktails','softs','jus','bieres','coin_chaud',
  'vins_blancs','vins_roses','vins_rouges','champagnes',
  'alcools_blancs','rhums','whisky','liqueurs','digestifs',
  'shooters','autres_alcools'
]);

// ── IMAGES PAR CATÉGORIE ─────────────────────────────────
const CAT_IMAGES = {
  plats:         'image/20251010195206_IMG_0921.jpg',
  grillades:     'image/20251010195206_IMG_0921.jpg',
  entrees:       'image/20251010195206_IMG_0919.jpg',
  tapas:         'image/20251010195206_IMG_0919.jpg',
  partager:      'image/20251010195206_IMG_0919.jpg',
  burgers:       'image/20251010195206_IMG_0919.jpg',
  cocktails:     'image/20251010195206_IMG_0922.jpg',
  mocktails:     'image/20251010195206_IMG_0918.jpg',
  softs:         'image/20251010195206_IMG_0918.jpg',
  jus:           'image/20251010195206_IMG_0918.jpg',
  bieres:        'image/20251010195206_IMG_0918.jpg',
  desserts:      'image/20251010195206_IMG_0920.jpg',
  pates:         'image/20251010195206_IMG_0920.jpg',
};
const DEFAULT_IMG = 'image/20251020151440_IMG_0192.jpg';

// ── CATÉGORIES ──────────────────────────────────────────
const CATS = [
  { id:'all',           label:'Tout',               icon:'✦'  },
  { id:'petits_dej',    label:'Petits Déjeuners',   icon:'☕' },
  { id:'tapas',         label:'Tapas',              icon:'🥙' },
  { id:'entrees',       label:'Entrées',            icon:'🥗' },
  { id:'partager',      label:'À Partager',         icon:'🤝' },
  { id:'plats',         label:'Nos Plats',          icon:'🍽️' },
  { id:'grillades',     label:'Grillades',          icon:'🔥' },
  { id:'pates',         label:'Pâtes',              icon:'🍝' },
  { id:'burgers',       label:'Burgers & Sandwichs',icon:'🍔' },
  { id:'plats_jour',    label:'Plats du Jour',      icon:'📅' },
  { id:'desserts',      label:'Desserts',           icon:'🍮' },
  { id:'enfants',       label:'Menu Enfants',       icon:'👶' },
  { id:'mocktails',     label:'Mocktails',          icon:'🌟' },
  { id:'cocktails',     label:'Cocktails',          icon:'🍹' },
  { id:'softs',         label:'Softs & Eaux',       icon:'💧' },
  { id:'coin_chaud',    label:'Boissons Chaudes',   icon:'☕' },
  { id:'jus',           label:'Jus',                icon:'🍊' },
  { id:'bieres',        label:'Bières',             icon:'🍺' },
  { id:'vins_blancs',   label:'Vins Blancs',        icon:'🍾' },
  { id:'vins_roses',    label:'Vins Rosés',         icon:'🌸' },
  { id:'vins_rouges',   label:'Vins Rouges',        icon:'🍷' },
  { id:'champagnes',    label:'Champagnes',         icon:'🥂' },
  { id:'alcools_blancs',label:'Alcools Blancs',     icon:'🥃' },
  { id:'rhums',         label:'Rhums',              icon:'🌴' },
  { id:'whisky',        label:'Whisky',             icon:'🥃' },
  { id:'liqueurs',      label:'Liqueurs',           icon:'🌿' },
  { id:'digestifs',     label:'Digestifs',          icon:'🥃' },
  { id:'shooters',      label:'Shooters',           icon:'🎯' },
  { id:'autres_alcools',label:'Autres Alcools',     icon:'🍸' },
];
const CAT_MAP = Object.fromEntries(CATS.map(c => [c.id, c.label]));

// ── STATE ───────────────────────────────────────────────
let allItems   = [];
let activeCat  = 'all';
let activeMenu = 'restaurant';
let searchQ    = '';
let cart       = [];
let activeItem = null;
let shQty      = 1;
let toastTimer = null;

const el  = id => document.getElementById(id);
const fmt = p  => Number(p).toLocaleString('fr-FR') + ' FCFA';

// ── RENDU CATÉGORIES ────────────────────────────────────
function renderCats() {
  const tabCats = activeMenu === 'restaurant' ? RESTAURANT_CATS : BAR_CATS;
  const visible = CATS.filter(c => c.id === 'all' || tabCats.has(c.id));
  el('cats').innerHTML = visible.map(c =>
    `<button class="cat-btn${c.id === activeCat ? ' active' : ''}" data-cat="${c.id}">
       <span>${c.icon}</span>${c.label}
     </button>`
  ).join('');
}

// ── RENDU MENU ──────────────────────────────────────────
function renderMenu() {
  const list = el('menu-list');
  const q = searchQ.toLowerCase();
  const tabCats = activeMenu === 'restaurant' ? RESTAURANT_CATS : BAR_CATS;
  const items = allItems.filter(i => {
    const tabOk = tabCats.has(i.cat);
    const catOk = activeCat === 'all' || i.cat === activeCat;
    const srOk  = !q || i.name.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q);
    return tabOk && catOk && srOk;
  });

  if (!items.length) {
    list.innerHTML = `<div class="empty"><div class="empty-ico">🔍</div><p>Aucun résultat${q ? ` pour "<b>${q}</b>"` : ''}.</p></div>`;
    return;
  }

  let html = '';
  if (activeCat === 'all' && !q) {
    CATS.filter(c => c.id !== 'all' && tabCats.has(c.id)).forEach(c => {
      const grp = items.filter(i => i.cat === c.id);
      if (!grp.length) return;
      html += `<div class="section-title">${c.icon} ${c.label}</div>`;
      html += `<div class="cards-grid">`;
      grp.forEach(i => { html += cardHtml(i); });
      html += `</div>`;
    });
  } else {
    const label = q ? 'Résultats' : (CAT_MAP[activeCat] || activeCat);
    html += `<div class="section-title">${label}</div>`;
    html += `<div class="cards-grid">`;
    items.forEach(i => { html += cardHtml(i); });
    html += `</div>`;
  }

  list.innerHTML = html;
}

function cardHtml(item) {
  const imgSrc   = CAT_IMAGES[item.cat] || DEFAULT_IMG;
  const newBadge = item.isNew ? `<span class="badge-new">Nouveau</span>` : '';
  return `<div class="card" data-id="${item.id}">
    <div class="card-visual">
      <div class="card-visual-bg" style="background:url('${imgSrc}') center/cover;filter:brightness(0.80);"></div>
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(61,46,20,0.55) 100%);pointer-events:none;"></div>
      <div class="card-initial">${item.name.charAt(0)}</div>
    </div>
    <div class="card-info">
      <div class="card-name">${item.name}</div>
      <div class="card-desc">${item.desc}</div>
      <div class="card-bottom">
        <div>
          <div class="card-price">${fmt(item.price)}</div>
          ${newBadge}
        </div>
        <button class="add-btn" data-add="${item.id}">+</button>
      </div>
    </div>
  </div>`;
}

// ── BOTTOM SHEET ────────────────────────────────────────
function openSheet(id) {
  activeItem = allItems.find(i => i.id === id);
  if (!activeItem) return;
  shQty = 1;
  updateShQty();

  const imgSrc = CAT_IMAGES[activeItem.cat] || DEFAULT_IMG;
  el('sh-bg').style.cssText = `background:url('${imgSrc}') center/cover no-repeat;filter:brightness(0.72);`;
  el('sh-emoji').textContent   = activeItem.emoji;
  el('sh-name').textContent    = activeItem.name;
  el('sh-cat').textContent     = CAT_MAP[activeItem.cat] || '';
  el('sh-desc').textContent    = activeItem.desc;
  el('sh-chips').innerHTML     = (activeItem.ingr || []).map(i =>
    `<div class="chip"><div class="chip-dot"></div>${i}</div>`).join('');

  el('sheet-overlay').classList.add('open');
  el('sheet').classList.add('open');
}

function closeSheet() {
  el('sheet-overlay').classList.remove('open');
  el('sheet').classList.remove('open');
}

function updateShQty() {
  el('sh-qty').textContent       = shQty;
  el('sh-add-price').textContent = activeItem ? fmt(activeItem.price * shQty) : '';
}

// ── PANIER ──────────────────────────────────────────────
function quickAdd(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  addToCart(item, 1);
  toast(item.name + ' ajouté');
}

function addToCart(item, qty) {
  const ex = cart.find(c => c.id === item.id);
  if (ex) ex.qty += qty;
  else cart.push({ ...item, qty });
  updateCartBar();
}

function updateCartBar() {
  const count = cart.reduce((s, c) => s + c.qty, 0);
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  el('cart-count').textContent = count;
  el('cart-total').textContent = fmt(total);
  el('cart-bar').classList.toggle('show', cart.length > 0);
}

// ── ORDER PANEL ─────────────────────────────────────────
function openOrder() {
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  el('op-items').innerHTML = cart.map(c =>
    `<div class="op-item">
       <div class="op-emoji">${c.emoji}</div>
       <div class="op-info">
         <div class="op-name">${c.qty > 1 ? c.qty + '× ' : ''}${c.name}</div>
         <div class="op-price">${fmt(c.price * c.qty)}</div>
       </div>
       <button class="op-rm" data-rm="${c.id}">Retirer</button>
     </div>`
  ).join('');
  el('op-total').innerHTML = total.toLocaleString('fr-FR') + ' <small>FCFA</small>';
  el('order-overlay').classList.add('open');
  el('order-panel').classList.add('open');
}

function closeOrder() {
  el('order-overlay').classList.remove('open');
  el('order-panel').classList.remove('open');
}

async function confirmOrder() {
  const note  = el('order-note').value;
  const items = cart.map(c => ({ id: c.id, name: c.name, price: c.price, qty: c.qty }));
  try {
    const res   = await fetch(API + '/orders', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ tableNumber: TABLE, items, note })
    });
    const order = await res.json();
    closeOrder();
    el('success-order').textContent = 'Commande #' + (order.id?.slice(-6).toUpperCase() || '—');
    setTimeout(() => {
      el('success').classList.add('open');
      cart = [];
      updateCartBar();
    }, 320);
  } catch {
    toast('Erreur réseau — serveur déconnecté ?');
  }
}

// ── TOAST ───────────────────────────────────────────────
function toast(msg) {
  el('toast-txt').textContent = msg;
  el('toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el('toast').classList.remove('show'), 2200);
}

// ── CHARGEMENT MENU ─────────────────────────────────────
async function loadMenu() {
  el('menu-list').innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-txt">Chargement…</div></div>`;
  try {
    const res = await fetch(API + '/menu');
    allItems  = await res.json();
    renderMenu();
  } catch {
    el('menu-list').innerHTML = `<div class="empty"><div class="empty-ico">⚠️</div><p>Impossible de charger le menu.<br>Vérifiez la connexion.</p></div>`;
  }
}

// ── LISTENERS GLOBAUX ─────────────────────────────────
// touchstart : UNIQUEMENT le bouton + rapide (réponse immédiate sans bloquer le scroll)
document.body.addEventListener('touchstart', function(e) {
  const addBtn = e.target.closest('[data-add]');
  if (addBtn) {
    e.preventDefault();
    e.stopPropagation();
    quickAdd(addBtn.dataset.add);
  }
}, { passive: false });

// click : tout le reste — cartes, catégories, sheet, panier
// (rapide sur mobile grâce à touch-action:manipulation déjà sur .card)
document.body.addEventListener('click', function(e) {
  handleInteraction(e);
});

function handleInteraction(e) {
  // bouton + rapide
  const addBtn = e.target.closest('[data-add]');
  if (addBtn) {
    e.preventDefault();
    e.stopPropagation();
    quickAdd(addBtn.dataset.add);
    return;
  }

  // carte → ouvrir sheet
  const card = e.target.closest('.card');
  if (card && !e.target.closest('[data-add]')) {
    e.preventDefault();
    openSheet(card.dataset.id);
    return;
  }

  // onglet Restaurant / Bar
  const menuTab = e.target.closest('[data-menu]');
  if (menuTab) {
    e.preventDefault();
    activeMenu = menuTab.dataset.menu;
    activeCat  = 'all';
    document.querySelectorAll('.menu-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.menu === activeMenu)
    );
    renderCats();
    renderMenu();
    const mc = el('main-content');
    if (mc) mc.scrollTop = 0;
    return;
  }

  // pill catégorie
  const catBtn = e.target.closest('[data-cat]');
  if (catBtn) {
    e.preventDefault();
    activeCat = catBtn.dataset.cat;
    renderCats();
    renderMenu();
    const mc = el('main-content');
    if (mc) mc.scrollTop = 0;
    return;
  }

  // fermer sheet
  if (e.target === el('sheet-overlay') || e.target.closest('#sh-close')) {
    e.preventDefault();
    closeSheet();
    return;
  }

  // qty −
  if (e.target.closest('#qty-minus')) {
    e.preventDefault();
    if (shQty > 1) { shQty--; updateShQty(); }
    return;
  }

  // qty +
  if (e.target.closest('#qty-plus')) {
    e.preventDefault();
    shQty++; updateShQty();
    return;
  }

  // ajouter depuis sheet
  if (e.target.closest('#sh-add')) {
    e.preventDefault();
    if (!activeItem) return;
    addToCart(activeItem, shQty);
    closeSheet();
    toast(activeItem.name + ' ajouté');
    return;
  }

  // ouvrir panier
  if (e.target.closest('#cart-btn')) {
    e.preventDefault();
    openOrder();
    return;
  }

  // fermer panier
  if (e.target === el('order-overlay') || e.target.closest('#op-close')) {
    e.preventDefault();
    closeOrder();
    return;
  }

  // retirer item
  const rmBtn = e.target.closest('[data-rm]');
  if (rmBtn) {
    e.preventDefault();
    cart = cart.filter(c => c.id !== rmBtn.dataset.rm);
    updateCartBar();
    if (!cart.length) closeOrder();
    else openOrder();
    return;
  }

  // appeler serveur
  if (e.target.closest('#btn-waiter')) {
    e.preventDefault();
    toast('Serveur appelé ! Il arrive…');
    closeOrder();
    return;
  }

  // confirmer commande
  if (e.target.closest('#btn-confirm')) {
    e.preventDefault();
    confirmOrder();
    return;
  }

  // retour depuis succès
  if (e.target.closest('#success-back')) {
    e.preventDefault();
    el('success').classList.remove('open');
    return;
  }
}

// ── RECHERCHE ───────────────────────────────────────────
el('search-input').addEventListener('input', function() {
  searchQ = this.value;
  renderMenu();
});

// ── INIT ────────────────────────────────────────────────
renderCats();
loadMenu();
</script>
